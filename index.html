<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="theme-color" content="#378ADD">
      <title>Compound Interest Calculator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
      <style>
          * {
              margin: 0;
            padding: 0;
            box-sizing: border-box;
}
        body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
                        color: #333;
}
        .container {
                      max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
        h1 {
                      font-size: 24px;
            margin-bottom: 24px;
            color: #378ADD;
}
        .input-group {
                      margin-bottom: 20px;
}
        label {
                      display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
}
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }
        .slider-value {
                      display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
}
        .metrics {
                      display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 24px 0;
            }
        .metric-card {
                      background: #f8f9fa;
                      border-radius: 8px;
            padding: 16px;
}
        .metric-label {
                      font-size: 13px;
            color: #666;
            margin-bottom: 4px;
}
        .metric-value {
                      font-size: 24px;
            font-weight: 600;
            color: #333;
}
        .metric-value.positive {
            color: #10a37f;
        }
        #chart {
            width: 100%;
            height: 300px;
            margin: 24px 0;
}
        .breakdown {
                      max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 16px;
}
        .breakdown-title {
                      font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
}
        .breakdown-row {
                      display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
}
        .breakdown-year {
                      color: #666;
}
        .breakdown-amount {
                      font-weight: 600;
}
        .breakdown-gain {
                      color: #10a37f;
            font-size: 12px;
}
    </style>
      </head>
      <body>
          <div class="container">
              <h1>💰 Compound Interest Calculator</h1>

        <div class="input-group">
            <label for="initialAmount">Initial amount (DKK)</label>
            <input type="number" id="initialAmount" value="100" min="1">
              </div>

              <div class="input-group">
                  <label for="interestRate">Interest rate (%)</label>
                  <input type="range" id="interestRate" min="0" max="15" step="0.1" value="3.5">
                  <div class="slider-value">
                      <span>0%</span>
                      <span id="rateDisplay">3.5%</span>
                      <span>15%</span>
                  </div>
              </div>

              <div class="input-group">
                  <label for="years">Number of years</label>
            <input type="range" id="years" min="1" max="50" value="10">
                  <div class="slider-value">
                      <span>1</span>
                      <span id="yearsDisplay">10</span>
                      <span>50</span>
                  </div>
              </div>

              <div class="metrics">
                  <div class="metric-card">
                      <div class="metric-label">Starting amount</div>
                      <div class="metric-value" id="startAmount">100 DKK</div>
                  </div>
                  <div class="metric-card">
                      <div class="metric-label">Final amount</div>
                      <div class="metric-value" id="finalAmount">141 DKK</div>
                  </div>
                  <div class="metric-card">
                      <div class="metric-label">Total gain</div>
                      <div class="metric-value positive" id="totalGain">+41 DKK</div>
                  </div>
              </div>

              <canvas id="chart"></canvas>

              <div class="breakdown">
                  <div class="breakdown-title">Yearly breakdown</div>
                  <div id="breakdownContent"></div>
              </div>
          </div>

          <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
          <script>
              if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
    }

        const initialInput = document.getElementById('initialAmount');
        const rateInput = document.getElementById('interestRate');
        const yearsInput = document.getElementById('years');
        const rateDisplay = document.getElementById('rateDisplay');
        const yearsDisplay = document.getElementById('yearsDisplay');
        const startAmount = document.getElementById('startAmount');
        const finalAmount = document.getElementById('finalAmount');
        const totalGain = document.getElementById('totalGain');
        const breakdownContent = document.getElementById('breakdownContent');

        let chartInstance;

        function calculate() {
                      const initial = parseFloat(initialInput.value) || 100;
            const rate = parseFloat(rateInput.value) || 3.5;
            const years = parseInt(yearsInput.value) || 10;

            rateDisplay.textContent = rate.toFixed(1) + '%';
            yearsDisplay.textContent = years.toString();
            startAmount.textContent = Math.round(initial).toLocaleString() + ' DKK';

            const labels = [];
            const data = [];
            let amount = initial;

            for (let i = 0; i <= years; i++) {
                labels.push(i.toString());
                data.push(Math.round(amount));
                if (i < years) {
                    amount *= (1 + rate / 100);
                }
            }

            const final = data[data.length - 1];
            const gain = final - initial;

            finalAmount.textContent = final.toLocaleString() + ' DKK';
            totalGain.textContent = '+' + Math.round(gain).toLocaleString() + ' DKK';

            let breakdownHTML = '';
            let currentAmount = initial;
            for (let i = 1; i <= years; i++) {
                const previousAmount = currentAmount;
                currentAmount *= (1 + rate / 100);
                const yearGain = currentAmount - previousAmount;
                breakdownHTML += `
                                      <div class="breakdown-row">
                                          <span class="breakdown-year">Year ${i}</span>
                                          <span class="breakdown-amount">${Math.round(currentAmount).toLocaleString()} DKK</span>
                                      <span class="breakdown-gain">+${Math.round(yearGain).toLocaleString()}</span>
                    </div>
                `;
}
            breakdownContent.innerHTML = breakdownHTML;

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = data;
                chartInstance.update();
} else {
                const ctx = document.getElementById('chart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Amount (DKK)',
                            data: data,
                            borderColor: '#378ADD',
                            backgroundColor: 'rgba(55, 138, 221, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 5
}]
},
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.parsed.y.toLocaleString() + ' DKK';
}
}
}
},
                        scales: {
                            x: {
                                title: { display: true, text: 'Years' },
                                grid: { display: false }
},
                            y: {
                                title: { display: true, text: 'Amount (DKK)' },
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString();
}
}
}
}
}
});
}
}

        initialInput.addEventListener('input', calculate);
        rateInput.addEventListener('input', calculate);
        yearsInput.addEventListener('input', calculate);

        calculate();
    </script>
</body>
</html>
